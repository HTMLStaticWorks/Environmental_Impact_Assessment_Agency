<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal Login | Envit Agency</title>
    <meta name="description"
        content="Log in to the Envit Environmental Impact Assessment Client Portal to track your project assessments, compliance reports, and geographical data files.">
    <!-- Favicon Links -->
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <!-- FontAwesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="assets/css/style.css?v=1.0.2">
</head>

<body class="auth-body">

    <!-- Theme and RTL Controls outside the Card (Not Fixed) -->
    <div class="auth-controls-wrapper">
        <button class="control-btn" id="theme-toggle-btn" title="Toggle Theme"
            style="width: 36px; height: 36px; font-size: 0.95rem;"><i class="fas fa-moon"></i></button>
        <button class="control-btn" id="rtl-toggle-btn" title="Toggle RTL"
            style="width: 36px; height: 36px; font-size: 0.95rem;"><i class="fas fa-exchange-alt"></i></button>
    </div>

    <!-- Main Auth Area (No Fixed Header or Footer) -->
    <main class="auth-main">
        <div class="auth-card fade-in appear" style="position: relative;">



            <!-- Website Logo Centered inside the Box -->
            <div class="auth-logo-wrapper"
                style="display: flex; justify-content: center; margin-bottom: 2rem; padding-top: 1rem;">
                <a href="index.html" class="logo" id="auth-logo" style="pointer-events: auto;">
                    <div class="logo-icon" style="background-color: var(--color-primary); color: #ffffff;"><i
                            class="fas fa-leaf"></i></div>
                    <div class="logo-text" style="color: var(--text-primary);">ENVIT<span
                            style="color: var(--color-primary); font-weight: 700;">AGENCY</span></div>
                </a>
            </div>

            <div class="auth-header">
                <h2>Portal Login</h2>
                <p>Log in to access your environmental survey portal</p>
            </div>

            <form class="auth-form" id="portal-login-form">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address *</label>
                    <input type="email" id="login-email" class="form-input" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Password *</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" id="pass-reveal"
                            aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-form-options">
                    <label
                        style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary);">
                        <input type="checkbox" id="remember-me"
                            style="accent-color: var(--color-primary); width: 16px; height: 16px;"> Remember me
                    </label>
                    <a href="#" style="color: var(--color-primary); font-weight: bold; font-size: 0.9rem;">Forgot
                        Password?</a>
                </div>

                <button type="submit" class="btn btn-primary auth-btn-submit" id="login-submit-btn"
                    style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Log In
                </button>
            </form>

            <div class="auth-divider">or continue with</div>

            <div class="auth-social-group">
                <button class="auth-btn-social google" type="button" id="login-google">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
                <button class="auth-btn-social facebook" type="button" id="login-facebook">
                    <i class="fab fa-facebook-f"></i> Continue with Facebook
                </button>
                <button class="auth-btn-social apple" type="button" id="login-apple">
                    <i class="fab fa-apple"></i> Continue with Apple
                </button>
            </div>

            <p class="auth-footer-text">
                Don't have an account? <a href="signup.html">Signup</a>
            </p>
        </div>
    </main>

    <!-- Main JavaScript -->
    <script src="assets/js/main.js"></script>
    <script>
        // Password toggle
        const passReveal = document.getElementById('pass-reveal');
        const loginPass = document.getElementById('login-password');
        if (passReveal && loginPass) {
            passReveal.addEventListener('click', () => {
                const isHidden = loginPass.type === 'password';
                loginPass.type = isHidden ? 'text' : 'password';
                passReveal.innerHTML = isHidden ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
            });
        }

        // Form submit simulation
        const loginForm = document.getElementById('portal-login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const submitBtn = document.getElementById('login-submit-btn');
                const originalText = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

                setTimeout(() => {
                    alert('Portal login successful (simulation). Redirecting to portal dashboard...');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }, 1500);
            });
        }

        // Social login simulations
        document.getElementById('login-google')?.addEventListener('click', () => alert('Google login simulation.'));
        document.getElementById('login-facebook')?.addEventListener('click', () => alert('Facebook login simulation.'));
        document.getElementById('login-apple')?.addEventListener('click', () => alert('Apple login simulation.'));
    </script>
</body>

</html>
